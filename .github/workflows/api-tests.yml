name: API Test Framework

on:
  push:
    branches:
      - master
      - develop

  pull_request:

  workflow_dispatch:

jobs:
  api-tests:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore packages
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Start WireMock
      working-directory: ./WireMock
      run: docker compose up -d

    - name: Wait for WireMock
      run: |
        for i in {1..20}; do
          if curl -s http://localhost:8080/__admin > /dev/null; then
            echo "WireMock is ready"
            exit 0
          fi
          echo "Waiting for WireMock..."
          sleep 2
        done

        echo "WireMock failed to start"
        exit 1

    - name: Run tests
      run: |
        dotnet test \
          --configuration Release \
          --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TestResults
        path: "**/*.trx"

    - name: Stop WireMock
      if: always()
      working-directory: ./WireMock
      run: docker compose down