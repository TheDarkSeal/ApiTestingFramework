services:
  wiremock:
    image: wiremock/wiremock:latest
    container_name: api-test-wiremock
    ports:
      - "8080:8080"
    volumes:
      - ./mappings:/home/wiremock/mappings
      - ./__files:/home/wiremock/__files
    entrypoint:
      - /docker-entrypoint.sh
      - --global-response-templating
      - --verbose